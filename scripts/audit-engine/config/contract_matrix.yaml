# 编号引用契约矩阵
# 定义：哪些编号类型必须在哪些下游产物中被引用

# PRD 产物：作为上游，其编号被下游引用
upstream_prd:
  - id_prefix: "REQ"
    downstream_type: "interaction"
    mandatory: true
    downstream_location: "§3 功能需求表格"
  - id_prefix: "REQ"
    downstream_type: "ui"
    mandatory: true
    downstream_location: "§2 需求映射"
  - id_prefix: "REQ"
    downstream_type: "tech"
    mandatory: true
    downstream_location: "§4 接口定义"

# 交互设计产物
upstream_interaction:
  - id_prefix: "UI-FLOW"
    downstream_type: "ui"
    mandatory: true
    downstream_location: "§3 交互映射"
  - id_prefix: "UI-FLOW"
    downstream_type: "tech"
    mandatory: true
    downstream_location: "§3 接口实现"

# UI 设计产物
upstream_ui:
  - id_prefix: "UI"
    downstream_type: "tech"
    mandatory: true
    downstream_location: "§4 接口定义"
  - id_prefix: "UI"
    downstream_type: "test"
    mandatory: true
    downstream_location: "§5 测试用例"

# 技术方案产物
upstream_tech:
  - id_prefix: "API"
    downstream_type: "test"
    mandatory: true
    downstream_location: "§5 测试用例"
  - id_prefix: "API"
    downstream_type: "deploy"
    mandatory: false
    downstream_location: "§6 部署验证"

# 产物类型 → 需要检查的上游规则映射
# 键为下游产物类型，值为需要引用的上游编号要求
prd:
  - id_prefix: "STORY"
    mandatory: false
    note: "如有用户故事，应映射到功能需求"

interaction:
  - id_prefix: "REQ"
    mandatory: true
    note: "所有交互设计必须基于 PRD 需求"

ui:
  - id_prefix: "REQ"
    mandatory: true
    note: "UI 设计必须覆盖 PRD 需求"
  - id_prefix: "UI-FLOW"
    mandatory: true
    note: "UI 设计必须实现交互流程"

tech:
  - id_prefix: "REQ"
    mandatory: true
    note: "技术方案必须实现 PRD 需求"
  - id_prefix: "UI"
    mandatory: true
    note: "技术方案必须实现 UI 设计"
  - id_prefix: "UI-FLOW"
    mandatory: true
    note: "技术方案必须实现交互流程"

test:
  - id_prefix: "REQ"
    mandatory: true
    note: "测试用例必须覆盖需求"
  - id_prefix: "API"
    mandatory: true
    note: "测试用例必须覆盖 API 接口"
