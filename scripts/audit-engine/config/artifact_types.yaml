# 产物类型定义
# 用户可自定义新增类型，或修改现有类型的检查规则

types:
  # 软件工程：产品需求文档
  prd:
    label: "产品需求文档"
    filename_patterns:
      - "prd"
      - "需求文档"
      - "产品需求"
    required_sections:
      - "背景|背景.*介绍"
      - "用户故事|需求.*概述"
      - "功能需求"
      - "业务规则"
      - "错误处理"
      - "验收标准"
    id_prefixes:
      - "REQ"

  # 软件工程：交互设计
  interaction:
    label: "交互设计"
    filename_patterns:
      - "interaction"
      - "交互设计"
      - "交互"
    required_sections:
      - "交互.*概述|流程.*概述"
      - "用户流程|流程图"
      - "状态.*定义|状态.*转换"
      - "异常.*路径|错误.*处理"
    id_prefixes:
      - "UI-FLOW"

  # 软件工程：UI 设计
  ui:
    label: "UI 设计"
    filename_patterns:
      - "ui"
      - "设计稿"
      - "视觉"
    required_sections:
      - "设计.*概述|视觉.*概述"
      - "设计.*规范|组件.*规范"
      - "响应式|适配"
      - "可访问性|无障碍"
    id_prefixes:
      - "UI"

  # 软件工程：技术方案
  tech:
    label: "技术方案"
    filename_patterns:
      - "tech"
      - "技术方案"
      - "架构"
    required_sections:
      - "架构|技术.*架构"
      - "接口.*定义|API"
      - "数据.*模型|数据库"
      - "安全|性能"
      - "部署|回滚"
    id_prefixes:
      - "API"

  # 软件工程：测试计划
  test:
    label: "测试计划"
    filename_patterns:
      - "test"
      - "测试计划"
      - "测试"
    required_sections:
      - "测试.*范围|测试.*目标"
      - "测试.*环境"
      - "测试.*用例"
      - "通过.*标准|验收.*标准"
    id_prefixes:
      - "TEST"

  # 通用：调研报告（示例）
  research:
    label: "调研报告"
    filename_patterns:
      - "research"
      - "调研"
      - "研究报告"
    required_sections:
      - "调研.*目的|研究.*背景"
      - "方法.*论|研究.*方法"
      - "数据.*分析|分析.*结果"
      - "结论|建议"
    id_prefixes:
      - "RES"

  # 通用：合规文档（示例）
  compliance:
    label: "合规文档"
    filename_patterns:
      - "compliance"
      - "合规"
      - "法规"
    required_sections:
      - "适用.*范围|scope"
      - "法规.*依据|legal.*basis"
      - "合规.*要求|requirements"
      - "风险.*评估|risk.*assessment"
    id_prefixes:
      - "COMP"

  # 市场策划
  marketing:
    label: "市场策划"
    filename_patterns:
      - "marketing"
      - "市场"
      - "策划"
    required_sections:
      - "目标.*受众|受众.*分析"
      - "营销.*策略|推广.*方案"
      - "预算.*分配|资源.*规划"
      - "效果.*评估|KPI|指标"
    id_prefixes:
      - "MKT"

  # 品牌方案
  brand:
    label: "品牌方案"
    filename_patterns:
      - "brand"
      - "品牌"
      - "定位"
    required_sections:
      - "品牌.*定位|核心.*价值"
      - "目标.*人群|受众.*画像"
      - "视觉.*规范|VI|标识"
      - "品牌.*故事|传播.*策略"
    id_prefixes:
      - "BRD"

  # 活动方案
  campaign:
    label: "活动方案"
    filename_patterns:
      - "campaign"
      - "活动"
      - "推广"
    required_sections:
      - "活动.*目标|目标.*设定"
      - "活动.*流程|执行.*计划"
      - "资源.*需求|人力.*物料"
      - "风险.*预案|应急.*方案"
      - "效果.*复盘|总结.*报告"
    id_prefixes:
      - "CMP"

  # 竞品分析
  competitor:
    label: "竞品分析"
    filename_patterns:
      - "competitor"
      - "竞品"
      - "竞争"
    required_sections:
      - "分析.*范围|对比.*对象"
      - "功能.*对比|特性.*矩阵"
      - "优劣势.*分析|SWOT"
      - "差异化.*建议|策略.*建议"
    id_prefixes:
      - "COM"

  # 默认 fallback
  generic:
    label: "通用文档"
    filename_patterns: []
    required_sections: []
    id_prefixes: []
