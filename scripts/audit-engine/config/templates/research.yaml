# 调研报告产物类型配置模板
# 适用场景：竞品分析、用户研究、市场调查、技术预研
# 使用方式：复制到 .singularity/config/artifact_types.yaml

types:
  research:
    label: "调研报告"
    filename_patterns: ["research", "调研", "研究报告"]
    required_sections:
      - "调研.*目的|研究.*背景"
      - "方法.*论|研究.*方法"
      - "数据.*分析|分析.*结果"
      - "结论|建议"
    id_prefixes: ["RES"]

  competitor:
    label: "竞品分析"
    filename_patterns: ["competitor", "竞品", "竞争"]
    required_sections:
      - "分析.*范围|对比.*对象"
      - "功能.*对比|特性.*矩阵"
      - "优劣势.*分析|SWOT"
      - "差异化.*建议|策略.*建议"
    id_prefixes: ["COM"]

  generic:
    label: "通用文档"
    filename_patterns: []
    required_sections: []
    id_prefixes: []
