# 全局术语表
# 定义：跨产物共享的标准术语及其规范用法
#
# 使用方式：
# 1. 在产物中统一使用"标准术语"
# 2. "允许别名"可在口语或非正式文档中使用，但正式产物中推荐使用标准术语
# 3. "禁止别名"在正式产物中不得出现，审计时会标记为不一致

terms:
  - standard: "用户"
    allowed_aliases: ["使用者", "终端用户"]
    forbidden_aliases: ["客户", "会员", "顾客"]
    definition: "使用系统功能的人，与业务客户不同"

  - standard: "需求"
    allowed_aliases: ["功能点"]
    forbidden_aliases: ["任务", "工单", "事项"]
    definition: "对产品功能的正式描述，有明确编号和验收标准"

  - standard: "上游文档"
    allowed_aliases: ["前置文档", "依赖文档"]
    forbidden_aliases: ["父文档", "母文档"]
    definition: "当前产物依赖的、先行产生的文档"

  - standard: "验收标准"
    allowed_aliases: ["验收条件", "通过标准"]
    forbidden_aliases: ["测试点", "检查项", "验证点"]
    definition: "判断功能是否完成的具体、可量化条件"

# 用户可在 .singularity/config/terminology.yaml 中扩展或覆盖
